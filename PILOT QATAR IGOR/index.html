<!doctype html>
<html lang="ru">
  <head>
    <title>От всех мальчиков 7В поздравляем с 8 марта</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card" id="mainCard">
      <h1 class="tittle">C праздником</h1>
      <p class="massage" id="message">нажми и удивись!</p>
      <button class="bth" onclick="startMagic()">нажимай красавица!</button>
    </div>
    <div id="flower-container"></div>

    <script>
      function startMagic() {
        const message = document.getElementById("message");
        const button = document.querySelector(".bth");
        const container = document.getElementById("flower-container");

        message.innerHTML = "Вы самые хорошие одноклассницы!";
        message.style.color = "#cc3366";

        button.style.display = "none";

        const icons = ["🌹", "🪻", "🥀", "💐", "🌸", "🌺", "🌷", "🌼"];

        for (let i = 0; i < 60; i++) {
          const flower = document.createElement("div");
          flower.classList.add("flower");
          flower.innerText = icons[Math.floor(Math.random() * icons.length)];
          flower.style.left = Math.random() * 100 + "vw";
          flower.style.animationDuration = Math.random() * 3 + 2 + "s";
          flower.style.fontSize = Math.random() * 20 + 30 + "px";
          container.appendChild(flower);

          setTimeout(() => {
            flower.remove();
          }, 5000);
        }
      }
    </script>
  </body>
</html>
